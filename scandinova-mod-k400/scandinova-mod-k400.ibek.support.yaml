          drvModbusAsynConfigure("RFMod_{{name}}_SOL_FLOW",              "RFMod_{{name}}", {{SLAVE_ADDR}}, 4, 812,  2, 7, {{POLLING}}, "SCN_RFMod_{{name}}")
