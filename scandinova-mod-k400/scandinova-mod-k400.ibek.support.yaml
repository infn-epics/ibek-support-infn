          drvModbusAsynConfigure("RFMod_{{name}}_FIL_PS_VOLT",      "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  202,  2,   7, {{POLLING_FAST}},  "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_TIME_REMAINING",   "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  6,    2,   7, {{POLLING}},       "SCN_RFMod_{{name}}")
