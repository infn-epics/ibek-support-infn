          drvModbusAsynConfigure("RFMod_{{name}}_SOL_PS_SUMILK",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  46,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
