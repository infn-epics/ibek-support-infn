# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.1.2/ibek.support.schema.json

module: scandinova-mod-k400

entity_models:
  - name: RFModulator
    description: |-
      Create a Scandinova K400 RF Modulator controller using Modbus TCP/IP.
      This configuration reuses the original startup command file from the
      scandinova-mod-k400 support repository.
    parameters:
      name:
        type: id
        description: |-
          The modulator identifier (e.g., "1", "2", "3")

      P:
        type: str
        description: |-
          Device PV prefix (e.g., "MODXX003")

      SLAVE_ADDR:
        type: int
        description: |-
          Modbus slave address
        default: 1

      IP:
        type: str
        description: |-
          IP address or hostname of the RF Modulator

      TCPPORT:
        type: int
        description: |-
          TCP port of the Modbus interface
        default: 502

      POLLING:
        type: int
        description: |-
          Standard polling interval in ms
        default: 500

      POLLING_FAST:
        type: int
        description: |-
          Fast polling interval in ms (waveforms, fast readbacks)
        default: 100

      WD_POLLING:
        type: int
        description: |-
          Watchdog polling interval in ms
        default: 250

    pre_init:
      - value: |
          #############################################################################
          # Scandinova RF Modulator K400 {{name}}
          #############################################################################
          epicsEnvSet("RFMOD_ASYNPORT", "RFMod_{{name}}")
          epicsEnvSet("RFMOD_MSGS", "SCN_RFMod_{{name}}")
          epicsEnvSet("RFMOD_POLLING", "{{POLLING}}")
          epicsEnvSet("RFMOD_POLLING_FAST", "{{POLLING_FAST}}")
          epicsEnvSet("RFMOD_WD_POLLING", "{{WD_POLLING}}")

          drvAsynIPPortConfigure("RFMod_{{name}}", "{{IP}}:{{TCPPORT}}", 0, 0, 1)
          modbusInterposeConfig("RFMod_{{name}}", 0, 2000, 0)

          ## CONTROL KEYS ##
          drvModbusAsynConfigure("RFMod_{{name}}_TCP_WD_PREV",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2,    1,   0, {{WD_POLLING}},    "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_STATE_RB",        "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  3,    1,   4, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_STATUS_RB",       "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  4,    1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_ACCESS_LEVEL",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  5,    1,   4, {{POLLING}},       "SCN_RFMod_{{name}}")

          ## CCPS KEYS ##
          drvModbusAsynConfigure("RFMod_{{name}}_CCPS_VOLT_SR",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  21,   2,   7, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_CCPS1_VOLT",      "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  100,  2,   7, {{POLLING_FAST}},  "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_CCPS2_VOLT",      "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  102,  2,   7, {{POLLING_FAST}},  "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_CCPS1_SUMILK",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  120,  1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_CCPS2_SUMILK",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  121,  1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_MAINS_ON_CMD_ILK","RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2304, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_BLEEDER_SUMILK",  "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  42,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")

          ## SWITCHING UNIT ##
          drvModbusAsynConfigure("RFMod_{{name}}_PLS_WDTH_SR",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  25,   2,   7, {{POLLING_FAST}},  "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_SU1_SUMILK",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  31,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_SU2_SUMILK",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  32,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_SU3_SUMILK",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  33,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_SU4_SUMILK",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  34,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_SU5_SUMILK",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  35,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_SU6_SUMILK",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  36,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_SU7_SUMILK",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  37,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_SU8_SUMILK",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  38,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_SU9_SUMILK",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  39,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_SU10_SUMILK",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  40,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")

          ## TRIGGER AND INTERLOCK ##
          drvModbusAsynConfigure("RFMod_{{name}}_PLS_REP_RATE",      "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  8,    2,   7, {{POLLING_FAST}},  "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_TRIG_ENAB_CMD_ILK", "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2301, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_STANDBY_SUMILK",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  43,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_HV_SUMILK",         "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  44,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_TRIG_SUMILK",       "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  45,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")

          ## POWER DISTRIBUTION UNIT ##
          drvModbusAsynConfigure("RFMod_{{name}}_TMAX_STS_ILK",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2335, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_HV_ENAB_STS_ILK", "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2336, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")

          ## TANK ##
          drvModbusAsynConfigure("RFMod_{{name}}_CT",               "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  500,  2,   7, {{POLLING_FAST}},  "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_CVD",              "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  502,  2,   7, {{POLLING_FAST}},  "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_FWHM_PLS_WDTH",   "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  504,  2,   7, {{POLLING_FAST}},  "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_AVG_POW",          "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  506,  2,   7, {{POLLING_FAST}},  "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_DIGI_SUMILK",      "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  41,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_DIGI_CT_HLIM",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2089, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_DIGI_CT_LLIM",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2090, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
