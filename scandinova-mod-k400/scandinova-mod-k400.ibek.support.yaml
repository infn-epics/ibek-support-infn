          drvModbusAsynConfigure("RFMod_{{name}}_RF_DIGI_SUMILK",   "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  47,   1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
