          drvModbusAsynConfigure("RFMod_{{name}}_FPS_VOLT_HLIM",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2108, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
