          drvModbusAsynConfigure("RFMod_{{name}}_RF_DIGI_FWD_HLIM", "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2233, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_RF_DIGI_FWD_LLIM", "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2234, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_RF_DIGI_RFL_HLIM", "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2235, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_RF_DIGI_RFL_LLIM", "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2236, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_RF_DIGI_PLSWD_HLIM","RFMod_{{name}}",{{SLAVE_ADDR}}, 4,  2237, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_RF_DIGI_PLSWD_LLIM","RFMod_{{name}}",{{SLAVE_ADDR}}, 4,  2238, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_RF_DIGI_VSWR_HLIM","RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2240, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_RF_DIGI_FWD_AVG_HLIM","RFMod_{{name}}",{{SLAVE_ADDR}},4, 2241, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")

          ## OIL / TANK ##
          drvModbusAsynConfigure("RFMod_{{name}}_OIL_TEMP",         "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  600,  2,   7, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_OIL_LVL",          "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  602,  2,   7, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_OIL_PUMP_CMD_ILK", "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2302, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_FLUID_TRAP_ILK",   "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2400, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_INVERTER_ILK",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2524, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_OIL_PUMP_TEMP_ILK","RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2526, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_OIL_FILTER_SUMILK","RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2528, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_BIAS_PS_ILK",      "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2405, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_OIL_LVL_HLIM",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2096, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_OIL_LVL_LLIM",     "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2097, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_OIL_TEMP_HLIM",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2098, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
          drvModbusAsynConfigure("RFMod_{{name}}_OIL_TEMP_LLIM",    "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2099, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")

