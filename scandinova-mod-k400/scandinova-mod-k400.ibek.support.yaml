          drvModbusAsynConfigure("RFMod_{{name}}_SOLPS1_CURR",      "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  400,  2,   7, {{POLLING}},       "SCN_RFMod_{{name}}")
