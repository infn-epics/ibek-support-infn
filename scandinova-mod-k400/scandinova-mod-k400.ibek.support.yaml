          drvModbusAsynConfigure("RFMod_{{name}}_DIGI_FWHM_HLIM",   "RFMod_{{name}}", {{SLAVE_ADDR}}, 4,  2093, 1,   0, {{POLLING}},       "SCN_RFMod_{{name}}")
