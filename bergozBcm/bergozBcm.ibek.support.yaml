# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.1.2/ibek.support.schema.json

# Bergoz BCM-RF-E Beam Charge Monitor — ibek support
#
# EPICS IOC for the Bergoz Turbo-ICT & BCM-RF-E Beam Charge Monitor.
# Based on BCM-RF Manual Rev. 2.4 (Nov. 2017), firmware >= 2.5.
#
# Uses the native bcmAsynMon driver (TCP/IP only).
# The driver manages the TCP connection and protocol parsing internally,
# with automatic reconnection on failure.
# Dependencies: asyn, calc (all standard).
#
# The device exposes one connection mode:
#   ipDevice — TCP/IP direct connection to device or ser2net converter

module: bergozBcm

entity_models:

  # ===========================================================================
  # IP device — connects directly via TCP/IP to the device or ser2net
  # ===========================================================================
  - name: ipDevice
    description: |-
      Bergoz BCM-RF-E connected via TCP/IP using the native bcmAsynMon driver.
      The driver manages the TCP connection and protocol parsing internally,
      with automatic reconnection on failure. No StreamDevice required.
    parameters:
      NAME:
        type: id
        description: |-
          Asyn port name for this device (e.g. BCM1)

      P:
        type: str
        description: |-
          PV prefix (e.g. BCM:RF:01)

      HOST:
        type: str
        description: |-
          IP address or hostname of the device or ethernet-to-serial converter

      TCPPORT:
        type: int
        description: |-
          TCP port number of the device
        default: 4001

      RECONNECT_MS:
        type: int
        description: |-
          Reconnection delay in milliseconds after a TCP disconnect
        default: 1000

      SCAN:
        type: str
        description: |-
          Measurement scan period (EPICS scan string, e.g. ".2 second")
        default: ".2 second"

    pre_init:
      - value: |
          bcmAsynMonConfigure("{{NAME}}", "{{HOST}}", {{TCPPORT}}, {{RECONNECT_MS}})

    databases:
      - file: $(TURBO_BERGOZ_BCM)/db/bcm-rf.db
        args:
          P: "{{P}}"
          PORT: "{{NAME}}"
          SCAN: "{{SCAN}}"
