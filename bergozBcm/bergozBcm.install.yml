# yaml-language-server: $schema=../../ibek-support/_scripts/support_install_variables.json

module: turbo-bergoz-bcm
organization: https://github.com/infn-epics

# TODO: pin to a release tag for deterministic builds
version: main

# The native bcmAsynMon driver manages its own TCP socket — no StreamDevice
# or drvAsynIPPort required. bcm-rf-ioc.dbd includes the bcmAsynMon
# registrar. asyn and calc are standard base-image deps.
dbds:
  - asyn.dbd
  - bcm-rf-ioc.dbd
  - calcSupport.dbd

libs:
  - asyn
  - calc
  - bcmAsynMonSupport

# Database template
db_files:
  - db/bcm-rf.db
