- name: Copy tml_lib to assets
  ansible.builtin.shell:
    cmd: |
      mkdir -p /assets/support/technosoft-tml-motor/ && \
      cp -r /epics/support/technosoft-tml-motor/tml_lib /assets/support/technosoft-tml-motor/
    executable: /bin/bash

- name: Finalize TML installation
  ansible.builtin.shell:
    cmd: |
      echo "/epics/support/technosoft-tml-motor/tml_lib/lib/" > /etc/ld.so.conf.d/tml.conf && ldconfig
    executable: /bin/bash
    chdir: /usr/local
